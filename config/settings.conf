# UrbanLens AI Configuration
# All values should be kept in a .env file for production

[DATABASE]
POSTGRES_HOST=localhost
POSTGRES_PORT=5432
POSTGRES_DB=urbanlens_ai
POSTGRES_USER=postgres
POSTGRES_PASSWORD=password

MONGODB_URI=mongodb://localhost:27017/
MONGODB_DB=urbanlens_ai

[APIS]
GOOGLE_MAPS_API_KEY=your_google_api_key_here
MAPILLARY_TOKEN=your_mapillary_token_here
OPENWEATHER_API_KEY=your_openweather_key_here
OPENAQ_API_KEY=your_openaq_key_here

[OSRM]
OSRM_URL=http://localhost:5000
OSRM_PROFILE=foot

[ML_MODELS]
YOLO_MODEL_PATH=models/yolov8m.pt
DEEPLAB_MODEL_VERSION=resnet101
DEVICE=cuda # or cpu
